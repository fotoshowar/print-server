<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FotoShow — Imprimir</title>
  <link rel="icon" type="image/x-icon" href="https://fotoshow.online/static/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --fs-green: #ADFF2F;
      --fs-green-dark: #7CFC00;
      --fs-green-rgb: 173, 255, 47;
      --fs-green-glow: rgba(173, 255, 47, 0.22);
      --fs-bg: #0a0a0a;
      --fs-bg-card: #111111;
      --fs-bg-card-2: #191919;
      --fs-border: rgba(173, 255, 47, 0.14);
      --fs-border-subtle: rgba(255, 255, 255, 0.07);
      --fs-text: #e2e8f0;
      --fs-text-muted: rgba(226, 232, 240, 0.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--fs-bg); color: var(--fs-text); min-height: 100vh; }

    /* Header */
    header {
      background: radial-gradient(ellipse 70% 60% at 20% 10%, rgba(173,255,47,0.08) 0%, transparent 55%), #0a0a0a;
      border-bottom: 1px solid var(--fs-border);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { height: 32px; }
    header h1 { font-size: 1rem; font-weight: 800; color: var(--fs-green); }
    .stats-bar { font-size: 0.7rem; color: var(--fs-text-muted); }

    .container { max-width: 600px; margin: 0 auto; padding: 12px; }

    /* Upload Zone */
    .upload-zone {
      background: var(--fs-bg-card);
      border: 2px dashed var(--fs-border);
      border-radius: 16px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 12px;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--fs-green);
      background: rgba(173,255,47,0.04);
      box-shadow: 0 0 30px rgba(173,255,47,0.08);
    }
    .upload-zone .icon { font-size: 2.5rem; margin-bottom: 4px; }
    .upload-zone p { color: var(--fs-text-muted); font-size: 0.85rem; }
    .upload-zone input[type="file"] { display: none; }

    .btn-fs {
      display: inline-block; background: var(--fs-green); color: #0a0a0a; border: none;
      border-radius: 10px; padding: 12px 28px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; font-family: 'Poppins', sans-serif;
    }
    .btn-fs:hover { background: var(--fs-green-dark); box-shadow: 0 0 20px var(--fs-green-glow); }

    /* Progress */
    .upload-progress { display: none; background: var(--fs-bg-card); border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; border: 1px solid var(--fs-border-subtle); }
    .progress-bar { height: 6px; background: var(--fs-bg-card-2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
    .progress-fill { height: 100%; background: var(--fs-green); border-radius: 3px; transition: width 0.3s; width: 0%; }

    /* Counter */
    .photo-count {
      font-size: 0.85rem; color: var(--fs-text-muted); margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* Grid */
    .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }

    .photo-card {
      background: var(--fs-bg-card); border-radius: 12px; overflow: hidden;
      border: 1px solid var(--fs-border-subtle);
      transition: all 0.3s;
    }
    .photo-card:hover { border-color: var(--fs-border); box-shadow: 0 4px 20px rgba(173,255,47,0.06); }
    .photo-card img { width: 100%; height: 150px; object-fit: cover; display: block; cursor: pointer; }
    .photo-card .actions { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .photo-card .actions .row { display: flex; gap: 4px; }

    .btn {
      flex: 1; padding: 8px 4px; border: none; border-radius: 8px;
      font-size: 0.72rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 3px;
      font-family: 'Poppins', sans-serif;
    }
    .btn-a4 { background: rgba(173,255,47,0.15); color: var(--fs-green); border: 1px solid rgba(173,255,47,0.3); }
    .btn-a4:hover { background: rgba(173,255,47,0.25); }
    .btn-a5 { background: rgba(124,252,0,0.12); color: var(--fs-green-dark); border: 1px solid rgba(124,252,0,0.25); }
    .btn-a5:hover { background: rgba(124,252,0,0.22); }
    .btn-share { background: rgba(0,255,127,0.12); color: #00FF7F; border: 1px solid rgba(0,255,127,0.25); }
    .btn-share:hover { background: rgba(0,255,127,0.22); }
    .btn-delete { background: rgba(255,50,50,0.1); color: #ff6b6b; flex: 0; padding: 8px 10px; border: 1px solid rgba(255,50,50,0.2); }
    .btn-delete:hover { background: rgba(255,50,50,0.2); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Share Modal */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      z-index: 1000; align-items: center; justify-content: center; padding: 20px;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: var(--fs-bg-card); border: 1px solid var(--fs-border);
      border-radius: 20px; padding: 24px; max-width: 360px; width: 100%; text-align: center;
    }
    .modal-content img.preview { width: 100%; max-height: 180px; object-fit: contain; border-radius: 10px; margin: 10px 0; }
    .modal-content img.qr { width: 180px; height: 180px; border-radius: 8px; margin: 10px auto; background: white; padding: 8px; }
    .modal-content h3 { font-size: 1rem; margin-bottom: 6px; color: var(--fs-green); }
    .modal-content p { color: var(--fs-text-muted); font-size: 0.8rem; margin-bottom: 6px; }
    .share-code {
      font-size: 1.8rem; font-weight: 900; color: var(--fs-green); letter-spacing: 4px;
      background: var(--fs-bg); padding: 10px 16px; border-radius: 10px; margin: 8px 0;
      font-family: monospace; border: 1px solid var(--fs-border);
      text-shadow: 0 0 10px var(--fs-green-glow);
    }
    .share-url {
      font-size: 0.7rem; color: var(--fs-text-muted); word-break: break-all;
      background: var(--fs-bg); padding: 8px 12px; border-radius: 8px; margin: 8px 0;
      cursor: pointer; border: 1px solid var(--fs-border-subtle);
    }
    .share-url:hover { color: var(--fs-green); border-color: var(--fs-border); }
    .modal-close {
      background: var(--fs-bg-card-2); color: var(--fs-text); border: 1px solid var(--fs-border-subtle);
      border-radius: 10px; padding: 10px 24px; font-size: 0.9rem; cursor: pointer; margin-top: 10px;
      font-weight: 600; font-family: 'Poppins', sans-serif;
    }
    .modal-close:hover { border-color: var(--fs-border); }

    /* Preview Modal */
    .preview-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 1001; align-items: center; justify-content: center; padding: 16px;
    }
    .preview-modal.open { display: flex; }
    .preview-modal img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 8px; }
    .preview-close {
      position: absolute; top: 12px; right: 12px; background: rgba(173,255,47,0.15);
      border: 1px solid rgba(173,255,47,0.3); width: 40px; height: 40px; border-radius: 50%;
      font-size: 1.3rem; cursor: pointer; color: var(--fs-green);
      display: flex; align-items: center; justify-content: center;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--fs-bg-card); color: var(--fs-text); padding: 12px 20px; border-radius: 10px;
      font-size: 0.85rem; transition: transform 0.3s; z-index: 2000; max-width: 320px;
      text-align: center; border: 1px solid var(--fs-border); font-family: 'Poppins', sans-serif;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--fs-green); color: var(--fs-green); }
    .toast.error { border-color: #ff4444; color: #ff6b6b; }

    .empty-state { text-align: center; padding: 40px 16px; color: var(--fs-text-muted); grid-column: 1/-1; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 8px; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(173,255,47,0.3); border-top-color: var(--fs-green);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .badge-fs {
      font-size: 0.65rem; background: rgba(173,255,47,0.1); padding: 3px 8px;
      border-radius: 6px; color: var(--fs-green); border: 1px solid rgba(173,255,47,0.2);
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="https://fotoshow.online/static/logo.png" class="logo" alt="FotoShow" onerror="this.style.display='none'">
    <div>
      <h1>FotoShow Print</h1>
      <div class="stats-bar" id="statsBar">📸 Cargando...</div>
    </div>
  </div>
</header>

<div class="container">
  <!-- Upload -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📸</div>
    <p>Toca para seleccionar fotos</p>
    <input type="file" id="fileInput" accept="image/*" multiple capture="environment">
    <button class="btn-fs" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
      Seleccionar Fotos
    </button>
  </div>

  <div class="upload-progress" id="uploadProgress">
    <p id="progressText" style="font-size:0.85rem;">Subiendo...</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- Counter -->
  <div class="photo-count">
    <span id="photoCount">🖼️ 0 fotos</span>
    <span id="printCount" class="badge-fs"></span>
  </div>

  <!-- Grid -->
  <div class="photo-grid" id="photoGrid">
    <div class="empty-state">
      <div class="icon">📂</div>
      <p>No hay fotos aún.<br>Subí una para empezar.</p>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div class="modal" id="shareModal">
  <div class="modal-content">
    <h3>📤 Compartir Foto</h3>
    <img class="preview" id="sharePreview" src="" alt="">
    <p>Código de descarga:</p>
    <div class="share-code" id="shareCode">------</div>
    <img class="qr" id="shareQR" src="" alt="QR">
    <div class="share-url" id="shareURL" onclick="copyURL()">Toca para copiar link</div>
    <p style="font-size:0.7rem;color:var(--fs-text-muted);">El cliente escanea el QR para descargar la foto</p>
    <button class="modal-close" onclick="closeShareModal()">Cerrar</button>
  </div>
</div>

<!-- Preview Modal -->
<div class="preview-modal" id="previewModal" onclick="closePreview()">
  <button class="preview-close">✕</button>
  <img id="previewImg" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let photos = [];
  let currentShareURL = '';

  const fileInput = document.getElementById('fileInput');
  fileInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    if (files.length > 0) uploadPhotos(files);
    fileInput.value = '';
  });

  const uploadZone = document.getElementById('uploadZone');
  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    if (files.length > 0) uploadPhotos(files);
  });

  async function uploadPhotos(files) {
    const progressEl = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    progressEl.style.display = 'block';
    progressText.textContent = `Subiendo ${files.length} foto(s)...`;
    progressFill.style.width = '10%';
    const formData = new FormData();
    files.forEach(f => formData.append('photos', f));
    try {
      let progress = 10;
      const interval = setInterval(() => { progress = Math.min(progress + 15, 90); progressFill.style.width = progress + '%'; }, 200);
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      clearInterval(interval);
      progressFill.style.width = '100%';
      if (!res.ok) throw new Error('Error');
      showToast(`✅ ${files.length} foto(s) subida(s)!`, 'success');
      setTimeout(() => { progressEl.style.display = 'none'; loadPhotos(); }, 500);
    } catch (err) { progressEl.style.display = 'none'; showToast('❌ Error al subir', 'error'); }
  }

  async function loadPhotos() {
    try {
      const res = await fetch('/api/photos');
      photos = await res.json();
      renderPhotos(); updateStats();
    } catch (err) { console.error(err); }
  }

  function renderPhotos() {
    const grid = document.getElementById('photoGrid');
    document.getElementById('photoCount').textContent = `🖼️ ${photos.length} foto(s)`;
    if (photos.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>No hay fotos aún.<br>Subí una para empezar.</p></div>';
      return;
    }
    grid.innerHTML = photos.map(p => `
      <div class="photo-card">
        <img src="/uploads/${p.filename}?t=${Date.now()}" alt="Foto" onclick="openPreview('/uploads/${p.filename}')">
        <div class="actions">
          <div class="row">
            <button class="btn btn-a4" onclick="printPhoto('${p.filename}', 'A4', this)">🖨️ A4</button>
            <button class="btn btn-a5" onclick="printPhoto('${p.filename}', 'A5', this)">📄 A5</button>
          </div>
          <div class="row">
            <button class="btn btn-share" onclick="sharePhoto('${p.filename}')">📤 QR</button>
            <button class="btn btn-delete" onclick="deletePhoto('${p.filename}')">🗑️</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  async function updateStats() {
    try {
      const res = await fetch('/api/stats');
      const s = await res.json();
      document.getElementById('statsBar').textContent = `📸 ${photos.length} fotos`;
      document.getElementById('printCount').textContent = `🖨️ ${s.totalPrinted} impresas · ⬇️ ${s.totalDownloaded} descargas`;
    } catch(e) {}
  }

  async function printPhoto(filename, size, btn) {
    const orig = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    try {
      const res = await fetch('/api/print', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename, size, printer: 'EPSON L805 Series' })
      });
      const data = await res.json();
      if (data.success) { showToast(`✅ Imprimiendo en ${size}`, 'success'); updateStats(); }
      else showToast('❌ Error', 'error');
    } catch (err) { showToast('❌ Error de conexión', 'error'); }
    finally { btn.disabled = false; btn.innerHTML = orig; }
  }

  async function sharePhoto(filename) {
    try {
      const res = await fetch(`/api/share/${filename}`);
      const data = await res.json();
      document.getElementById('shareCode').textContent = data.shareCode;
      document.getElementById('shareQR').src = data.qrURL;
      document.getElementById('sharePreview').src = `/uploads/${filename}`;
      document.getElementById('shareURL').textContent = data.shareURL;
      currentShareURL = data.shareURL;
      document.getElementById('shareModal').classList.add('open');
    } catch (err) { showToast('❌ Error al compartir', 'error'); }
  }

  function closeShareModal() { document.getElementById('shareModal').classList.remove('open'); }

  function copyURL() {
    navigator.clipboard.writeText(currentShareURL).then(() => showToast('📋 Link copiado!', 'success'))
    .catch(() => { const el = document.createElement('textarea'); el.value = currentShareURL; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); showToast('📋 Link copiado!', 'success'); });
  }

  async function deletePhoto(filename) {
    if (!confirm('¿Eliminar esta foto?')) return;
    try { await fetch(`/api/photos/${filename}`, { method: 'DELETE' }); showToast('🗑️ Eliminada', ''); loadPhotos(); }
    catch (err) { showToast('❌ Error', 'error'); }
  }

  function openPreview(src) { document.getElementById('previewImg').src = src; document.getElementById('previewModal').classList.add('open'); }
  function closePreview() { document.getElementById('previewModal').classList.remove('open'); }

  function showToast(msg, type) {
    const t = document.getElementById('toast'); t.textContent = msg;
    t.className = 'toast show ' + (type || '');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadPhotos();
  setInterval(loadPhotos, 15000);
</script>

</body>
</html>
